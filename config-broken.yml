schemaVersion: '2.0.0'
commandTests:
  - name: "restic installation"
    command: "which"
    args: ["restic"]
    expectedOutput: ["/usr/bin/restic"]
fileExistenceTests:
- name: 'config log directory exists'
  path: '/config/logs'
  shouldExist: true
- name: 'cron log file exists'
  path: '/config/logs/cron.log'
  shouldExist: true
- name: 'backup script exists'
  path: '/bin/backup'
  shouldExist: true
metadataTest:
  volumes: ["/data", "/config"]
  entrypoint: ["/init"]
